name: CI

on:
  pull_request:
  push:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-apple-clang
            os: macos-latest
            cc: clang
          - name: ubuntu-gcc
            os: ubuntu-24.04
            cc: gcc
          - name: ubuntu-clang
            os: ubuntu-24.04
            cc: clang

    steps:
      - uses: actions/checkout@v5

      - name: Install build tools
        shell: bash
        run: |
          if command -v ninja >/dev/null 2>&1; then
            exit 0
          elif [ "$RUNNER_OS" = "macOS" ]; then
            brew install ninja
          else
            sudo apt-get update
            sudo apt-get install -y ninja-build
          fi

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cc == 'clang' && 'clang++' || 'g++' }}
        run: cmake --preset dev

      - name: Build
        run: cmake --build --preset dev

      - name: Test
        run: ctest --preset dev

  embedded:
    name: ubuntu-embedded
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v5

      - name: Install embedded build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bison \
            build-essential \
            cmake \
            libcrypt-dev \
            libncurses-dev \
            libpcre2-dev \
            libssl-dev \
            ninja-build \
            pkg-config \
            php-cli \
            php-dev \
            zlib1g-dev

      - name: Build MariaDB embedded archive
        run: tools/mariadb-embedded-build all

      - name: Configure
        run: cmake --preset php-embedded-dev

      - name: Build
        run: cmake --build --preset php-embedded-dev

      - name: Test
        run: ctest --preset php-embedded-dev

  wordpress-phpunit:
    name: wordpress-phpunit-mysqli-mylite
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    env:
      # Keep CI reproducible while the local runner continues to default to
      # WordPress trunk for exploratory compatibility checks.
      MYLITE_WORDPRESS_REF: 6ddfc9d9b532c6e95c1266165149815895e2eb56

    steps:
      - uses: actions/checkout@v5

      - name: Show runner resources
        run: |
          df -h .
          free -h
          docker version

      - name: Run WordPress PHPUnit suite
        run: tools/wordpress-phpunit-mysqli-mylite

      - name: Show generated artifact sizes
        if: always()
        run: |
          du -sh \
            build/wordpress-tests.mylite \
            build/wordpress-develop \
            build/wordpress-phpunit-tools \
            build/wordpress-mariadb-embedded \
            build/wordpress-php-embedded \
            2>/dev/null || true
          df -h .

  clang-tools:
    name: clang-format and clang-tidy
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v5

      - name: Install clang tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang clang-format clang-tidy ninja-build

      - name: Configure
        env:
          CC: clang
          CXX: clang++
        run: cmake --preset dev

      - name: Check formatting
        run: cmake --build --preset format-check

      - name: Run clang-tidy
        run: cmake --build --preset tidy
