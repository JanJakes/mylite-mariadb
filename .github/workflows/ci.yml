name: CI

on:
  pull_request:
  push:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-apple-clang
            os: macos-latest
            cc: clang
          - name: ubuntu-gcc
            os: ubuntu-24.04
            cc: gcc
          - name: ubuntu-clang
            os: ubuntu-24.04
            cc: clang

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        shell: bash
        run: |
          if command -v ninja >/dev/null 2>&1; then
            exit 0
          elif [ "$RUNNER_OS" = "macOS" ]; then
            brew install ninja
          else
            sudo apt-get update
            sudo apt-get install -y ninja-build
          fi

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cc == 'clang' && 'clang++' || 'g++' }}
        run: cmake --preset dev

      - name: Build
        run: cmake --build --preset dev

      - name: Test
        run: ctest --preset dev

  embedded:
    name: ubuntu-embedded
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install embedded build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bison \
            build-essential \
            cmake \
            libncurses-dev \
            libpcre2-dev \
            libssl-dev \
            ninja-build \
            pkg-config \
            zlib1g-dev

      - name: Build MariaDB embedded archive
        run: tools/mariadb-embedded-build all

      - name: Configure
        run: cmake --preset embedded-dev

      - name: Build
        run: cmake --build --preset embedded-dev

      - name: Test
        run: ctest --preset embedded-dev

  clang-tools:
    name: clang-format and clang-tidy
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install clang tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang clang-format clang-tidy ninja-build

      - name: Configure
        env:
          CC: clang
          CXX: clang++
        run: cmake --preset dev

      - name: Check formatting
        run: cmake --build --preset format-check

      - name: Run clang-tidy
        run: cmake --build --preset tidy
